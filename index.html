<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Viewer</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #111;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    img {
      display: block;
      max-width: 100%;
      max-height: calc(100vh - 32px);
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <img src="image.jpg" alt="Displayed image" />
</body>
</html>
